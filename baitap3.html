<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>
<body>
    <form action="">
        <table>
            <tr>
                <th>Registration Form</th>
            </tr>
            <tr>
                <td>
                    <label for="first">First name:</label>
                </td>
                <td>
                    <input type="text" id="first" placeholder="Enter First Name">
                </td>
            </tr>
            <tr>
                <td>
                <label for="last">Last Name:</label>  
                </td>
                <td>
                <input type="text" id="last" placeholder="Enter Last Name">  
                </td>
            </tr>
            <tr>
                <td>
                <label for="email">Email:</label> 
                </td>
                <td>
                <input type="text" id="email" placeholder="Enter Email Address">  
                </td>
            </tr>
            <tr>
               <td>
                <label for="pw">Password:</label>
               </td> 
               <td>
                <input type="password" id="pw">
               </td>
            </tr>
            <tr>
                <td>
                <label for="">Gender: </label>
                </td>
                <td>
                <input type="radio" name="gt"> Male <input type="radio" name="gt" > Female <input type="radio" name="gt" > Other  
                </td>
            </tr>
            <tr>
                <td><label for="tuoi">Age</label></td>
                <td><input type="number" id="tuoi"></td>
            </tr>
            <tr>
                <td>
                <label for="">Preferences: </label>
                </td>
                <td>
                <input type="checkbox"> Acrylic Painting
                <input type="checkbox"> Oil Painting
                <input type="checkbox"> Water Color Painting
                </td>
            </tr>
            <tr>
                <td>
                <label for="">Select Occupation: </label>
                </td>
                <td>
                <select>
                    <option>Student</option>
                    <option>Lecture</option>
                    <option>Other</option>
                </select>    
                </td>
            </tr>
            <tr>
                <td>
                    <label for="">Bio: </label>   
                </td>
                <td>
                    <Textarea placeholder="Share few lines about yourself..."></Textarea> 
                </td>
            </tr>
        </table>
    <input type="reset" value="Reset">
    <input type="submit" value="Submit">
    </form>
</body>
</html>
